<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="header">
        <h1>2048</h1>
        <div class="scores-container">
            <div class="score-box">
                <div class="score-title">Score</div>
                <div id="score" class="score-value">0</div>
            </div>
            <div class="score-box">
                <div class="score-title">Best Score</div>
                <div id="best-score" class="score-value">0</div>
            </div>
        </div>
    </div>
    <div class="grid-container">
        <div class="grid">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>
        <div class="game-over">
            <div class="game-over-text">Game Over!</div>
            <button class="restart-button" onclick="restartGame()">Try Again</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
